name: Deploy Recap Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    # -----------------------------
    # BACKEND DEPLOYMENT
    # -----------------------------

    - name: Install Backend Dependencies
      shell: powershell
      run: |
        cd api
        npm install

    - name: Stop Backend (PM2)
      shell: powershell
      run: |
        pm2 stop recap-api

    - name: Deploy Backend Code
      shell: powershell
      run: |
        robocopy api C:\WebApp_Recap4NDC\RECAP4NDC\api /E /NFL /NDL /NJH /NJS /nc /ns

    - name: Start Backend
      shell: powershell
      run: |
        cd C:\WebApp_Recap4NDC\RECAP4NDC\api
        pm2 start index.js --name recap-api --update-env
        pm2 save

    # -----------------------------
    # FRONTEND BUILD
    # -----------------------------

    - name: Install Frontend Dependencies
      shell: powershell
      run: |
        cd Web
        npm install

    - name: Build React Application
      shell: powershell
      run: |
        cd Web
        npm run build

    # -----------------------------
    # FRONTEND DEPLOY
    # -----------------------------

    - name: Deploy Frontend Build
      shell: powershell
      run: |
        robocopy Web\build C:\WebApp_Recap4NDC\RECAP4NDC\Web\build /E /NFL /NDL /NJH /NJS /nc /ns
